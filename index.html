<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pharmacy Map</title>
  <style>
    /* Basic page reset and font */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f9fc; /* simple, clean background */
      color: #222;
    }

    /* Page layout: centered header, map, small footer */
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: stretch;
    }

    header {
      text-align: center;
      padding: 18px 12px;
      margin: 8px 0;
    }

    header h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 600;
      color: #0b3954;
      letter-spacing: 0.3px;
    }

    /* Map container fills most of the viewport as requested (90% of viewport height).
       This ensures the map is responsive and occupies the main visible area. */
    #map {
      width: 100%;
      height: 90vh; /* map fills 90% of the viewport height */
      box-sizing: border-box;
      border: 1px solid rgba(11,57,84,0.08);
      border-radius: 6px;
      margin: 0 auto;
      /* On very narrow screens allow it to remain full width */
      max-width: 1400px;
    }

    /* Footer / legend */
    footer {
      text-align: center;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: #4a4a4a;
    }

    /* Styling for info window content when displayed */
    .info-window {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px; /* readable font size for popups */
      line-height: 1.35;
      max-width: 260px;
    }

    .info-window .name {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0b3b5c;
    }

    .info-window .hours {
      font-size: 13px;
      margin-bottom: 6px;
      color: #1f3b4d;
    }

    .info-window .desc {
      font-size: 13px;
      color: #333;
    }

    /* Small responsive tweaks */
    @media (max-width: 600px) {
      header h1 { font-size: 1.25rem; }
      .info-window { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header role="banner" aria-label="Page header">
      <h1>Pharmacy Map</h1>
    </header>

    <!-- Map element: the Google Maps API will render the map here -->
    <main>
      <div id="map" role="region" aria-label="Map showing pharmacies"></div>
    </main>

    <!-- Small footer/legend -->
    <footer role="contentinfo">
      Markers indicate pharmacies
    </footer>
  </div>

  <!--
    Google Maps JavaScript API
    - Replace YOUR_API_KEY with your actual API key.
    - async & defer ensure the script loads asynchronously and executes after parsing.
    - callback=initMap will call the global initMap function below when the API is ready.
  -->
  <script
    src="https://https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"
    async
    defer></script>

  <script>
    /*
      JavaScript for Pharmacy Map
      - initMap(): map initialization and marker setup (called by Google Maps API)
      - pharmacies[]: array of pharmacy objects (name, lat/lng, hours, description)
      - For clarity, this file contains detailed comments describing each main step.
    */

    // 1) Data: Define an array of example pharmacy objects.
    //    Each object contains:
    //      - name: string shown in the info popup (bold)
    //      - position: { lat, lng } coordinates
    //      - hours: opening hours string
    //      - description: optional short description
    const pharmacies = [
      {
        name: 'Central Pharmacy',
        position: { lat: 41.2995, lng: 69.2401 }, // center of Tashkent
        hours: '08:00 - 22:00',
        description: 'Located near Amir Timur Square. Large selection of medicines and staff speak English.'
      },
      {
        name: 'Soglom Apteka',
        position: { lat: 41.3052, lng: 69.2355 },
        hours: '09:00 - 21:00',
        description: 'Community pharmacy with 24/7 emergency supply on weekends.'
      },
      {
        name: 'Green Health Pharmacy',
        position: { lat: 41.2928, lng: 69.2339 },
        hours: '07:30 - 20:00',
        description: 'Known for herbal remedies and friendly pharmacists.'
      },
      {
        name: 'Nur Pharmacy',
        position: { lat: 41.2959, lng: 69.2504 },
        hours: '08:00 - 23:00',
        description: 'Conveniently located near the metro station; accepts electronic payments.'
      }
    ];

    // 2) initMap: This function is called by the Google Maps API once it finishes loading.
    //    It:
    //      - creates the map centered on Tashkent with zoom appropriate for a city view
    //      - adds markers dynamically from the pharmacies array
    //      - binds info windows to each marker so clicking a marker opens its popup
    function initMap() {
      // Map center coordinates (Tashkent example)
      const tashkentCoords = { lat: 41.2995, lng: 69.2401 };

      // Map initialization:
      // - center: set to the city's coordinates
      // - zoom: 13 is a typical city-level zoom (street-level detail)
      // - mapTypeControl, streetViewControl etc. are left as defaults (default controls enabled)
      const map = new google.maps.Map(document.getElementById('map'), {
        center: tashkentCoords,
        zoom: 13,
        // We intentionally keep default controls enabled (zoom, pan, mapType, etc.)
        // to provide the user with familiar interactions.
      });

      // Single InfoWindow instance reused for all markers.
      // Reusing a single InfoWindow is more efficient and ensures only one popup is open at a time.
      const infoWindow = new google.maps.InfoWindow();

      // Marker creation:
      // Iterate through the pharmacies array and create a Google Maps Marker for each entry.
      pharmacies.forEach((pharmacy) => {
        // Create marker
        const marker = new google.maps.Marker({
          position: pharmacy.position,
          map: map,
          title: pharmacy.name
          // You can add custom icons here if desired, e.g. icon: 'path/to/icon.png'
        });

        // Build the HTML content for the popup (info window).
        // We use classes and inline HTML structure to control font size and readability.
        const content = `
          <div class="info-window" role="dialog" aria-label="${escapeHtml(pharmacy.name)} info">
            <span class="name">${escapeHtml(pharmacy.name)}</span>
            <div class="hours"><strong>Opening hours:</strong> ${escapeHtml(pharmacy.hours)}</div>
            <div class="desc">${escapeHtml(pharmacy.description)}</div>
          </div>
        `;

        // Bind click event to marker to open the info window with the prepared content.
        marker.addListener('click', () => {
          // Set the content of the shared InfoWindow and open it anchored to the clicked marker.
          infoWindow.setContent(content);
          infoWindow.open(map, marker);

          // Optionally pan the map slightly so the info window is fully visible on small screens.
          // We center the map at the marker (this can be adjusted or removed if undesired).
          map.panTo(marker.getPosition());
        });
      });

      // Optionally: Fit map bounds to show all markers (useful if markers spread out).
      // Here all markers are within the same city; uncomment below to auto-fit if needed.
      /*
      const bounds = new google.maps.LatLngBounds();
      pharmacies.forEach(p => bounds.extend(p.position));
      map.fitBounds(bounds);
      */
    }

    /*
      Utility: Simple HTML-escaping helper to avoid injecting unintended HTML into info windows.
      This keeps our info window content safe if any value contains special characters.
    */
    function escapeHtml(text) {
      if (!text && text !== 0) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Expose initMap globally for the Google Maps API callback (already defined above).
    // Note: initMap is declared as a function in global scope; no additional export needed.
  </script>
</body>
</html>
